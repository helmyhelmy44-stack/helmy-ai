<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmy AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #ffd700;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border-bottom: 2px solid #ffd700;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 40px; height: 40px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #000;
        }
        .header-text h1 { font-size: 18px; }
        .header-text p { font-size: 11px; color: #c0a040; }
        .stats {
            margin-right: auto;
            display: flex;
            gap: 8px;
            font-size: 11px;
        }
        .stat {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            padding: 4px 10px;
            border-radius: 15px;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-msg {
            align-self: flex-start;
            background: #1a1a1a;
            border: 1px solid #ffd700;
            color: #ffd700;
        }
        .ai-msg {
            align-self: flex-end;
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.3);
            color: #ffd700;
        }
        .system-msg {
            align-self: center;
            color: #c0a040;
            font-size: 12px;
            padding: 5px;
        }
        .typing {
            align-self: flex-end;
            color: #c0a040;
            font-size: 13px;
            padding: 8px;
        }
        .input-area {
            background: #1a1a1a;
            border-top: 2px solid #ffd700;
            padding: 10px;
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #ffd700;
            border-radius: 20px;
            padding: 10px 15px;
            color: #ffd700;
            font-size: 14px;
        }
        .input-area button {
            width: 42px; height: 42px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            color: #000;
            font-size: 16px;
            cursor: pointer;
        }
        .keys-panel {
            background: #1a1a1a;
            border-top: 1px solid #ffd700;
            padding: 10px;
            max-height: 180px;
            overflow-y: auto;
        }
        .key-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            margin: 4px 0;
            background: #0a0a0a;
            border-radius: 8px;
            font-size: 12px;
        }
        .key-input {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .key-input input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #ffd700;
            border-radius: 8px;
            padding: 8px;
            color: #ffd700;
            font-size: 12px;
        }
        .key-input button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
        }
        .toggle-btn {
            position: fixed;
            bottom: 70px;
            left: 10px;
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 6px 10px;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">H</div>
    <div class="header-text">
        <h1>Helmy AI</h1>
        <p>مساعدك الذكي</p>
    </div>
    <div class="stats">
        <div class="stat">⚡ <span id="reqCount">0/1250</span></div>
        <div class="stat">🔑 <span id="keyCount">0/5</span></div>
    </div>
</div>

<div class="chat" id="chat">
    <div class="system-msg" style="text-align:center; padding:20px;">
        <h2 style="color:#ffd700; margin-bottom:10px;">👋 مرحباً في Helmy AI!</h2>
        <p>🎤 اضغط 🎤 للتحدث</p>
        <p>📝 اكتب في الحقل</p>
        <p>🔑 أضف حتى 5 مفاتيح API</p>
    </div>
</div>

<button class="toggle-btn" onclick="toggleKeys()">🔑 المفاتيح</button>

<div class="keys-panel" id="keysPanel" style="display:none;">
    <div style="font-size:12px; color:#c0a040; margin-bottom:6px;">🔐 المفاتيح (5 = 1250 طلب/يوم)</div>
    <div id="keysList"></div>
    <div class="key-input">
        <input type="text" id="keyInput" placeholder="الصق مفتاح API...">
        <button onclick="addKey()">+</button>
    </div>
</div>

<div class="input-area">
    <button onclick="toggleVoice()" id="voiceBtn">🎤</button>
    <input type="text" id="userInput" placeholder="اكتب هنا..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">➤</button>
</div>

<script>
const MAX_KEYS = 5;
const MODEL = 'gemini-2.0-flash';
const LIMIT = 250;

let keys = JSON.parse(localStorage.getItem('helmy_keys') || '[]');
let counts = JSON.parse(localStorage.getItem('helmy_counts') || '{}');
let keyIndex = 0;
let isListening = false;
let recognition = null;

function initVoice() {
    if (!('webkitSpeechRecognition' in window)) {
        alert('المتصفح لا يدعم الصوت');
        return;
    }
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'ar-SA';
    recognition.onresult = (e) => {
        document.getElementById('userInput').value = e.results[0][0].transcript;
        send();
    };
    recognition.onend = () => {
        isListening = false;
        document.getElementById('voiceBtn').textContent = '🎤';
    };
}

function toggleVoice() {
    if (!recognition) initVoice();
    if (!recognition) return;
    if (isListening) {
        recognition.stop();
        isListening = false;
        document.getElementById('voiceBtn').textContent = '🎤';
    } else {
        recognition.start();
        isListening = true;
        document.getElementById('voiceBtn').textContent = '⏹️';
        addSystem('🎤 استمع...');
    }
}

function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ar-SA';
        window.speechSynthesis.speak(u);
    }
}

function save() {
    localStorage.setItem('helmy_keys', JSON.stringify(keys));
    localStorage.setItem('helmy_counts', JSON.stringify(counts));
    updateStats();
}

function addKey() {
    const val = document.getElementById('keyInput').value.trim();
    if (!val || val.length < 20) {
        addSystem('⚠️ المفتاح قصير');
        return;
    }
    if (keys.length >= MAX_KEYS) {
        addSystem('⚠️ الحد 5 مفاتيح');
        return;
    }
    if (keys.some(k => k.value === val)) {
        addSystem('⚠️ موجود بالفعل');
        return;
    }
    keys.push({ value: val, status: 'active' });
    document.getElementById('keyInput').value = '';
    save();
    addSystem('✅ مفتاح جديد! ' + keys.length + '/5');
}

function removeKey(i) {
    keys.splice(i, 1);
    if (keyIndex >= keys.length) keyIndex = 0;
    save();
}

function getKey() {
    if (!keys.length) return null;
    for (let i = 0; i < keys.length; i++) {
        const idx = (keyIndex + i) % keys.length;
        const id = keys[idx].value.substring(0, 5);
        if ((counts[id] || 0) < LIMIT) {
            keyIndex = idx;
            return keys[idx];
        }
    }
    return null;
}

function record(key) {
    const id = key.value.substring(0, 5);
    counts[id] = (counts[id] || 0) + 1;
    save();
}

function toggleKeys() {
    const p = document.getElementById('keysPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function addSystem(text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addMsg(text, isUser) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + (isUser ? 'user-msg' : 'ai-msg');
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.textContent = '⏳ جاري...';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
}

async function send() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    if (!keys.length) {
        addSystem('🔑 أضف مفتاح أولاً');
        toggleKeys();
        return;
    }

    const key = getKey();
    if (!key) {
        addSystem('⚠️ انتهت المفاتيح');
        return;
    }

    input.value = '';
    addMsg(text, true);
    showTyping();

    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key.value}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
            }
        );

        record(key);
        const data = await res.json();
        hideTyping();

        if (!res.ok) {
            addMsg('⚠️ خطأ ' + res.status + ': ' + (data.error?.message || ''), false);
            return;
        }

        if (data.candidates?.[0]?.content) {
            const reply = data.candidates[0].content.parts[0].text;
            addMsg(reply, false);
            speak(reply);
        } else {
            addMsg('⚠️ لا رد', false);
        }
    } catch (err) {
        hideTyping();
        addMsg('⚠️ خطأ: ' + err.message, false);
    }
    updateStats();
}

function updateStats() {
    document.getElementById('keyCount').textContent = keys.length + '/5';
    let used = 0;
    keys.forEach(k => used += counts[k.value.substring(0, 5)] || 0);
    document.getElementById('reqCount').textContent = used + '/' + (keys.length * LIMIT);

    const list = document.getElementById('keysList');
    list.innerHTML = '';
    keys.forEach((k, i) => {
        const id = '•••••';
        const c = counts[k.value.substring(0, 5)] || 0;
        const p = (c / LIMIT * 100).toFixed(0);
        const status = c >= LIMIT ? '❌' : c >= 200 ? '⚠️' : '✅';
        list.innerHTML += `
            <div class="key-row">
                <span>${id} ${c}/${LIMIT} (${p}%)</span>
                <span>${status} <button onclick="removeKey(${i})" style="background:#ff4444;color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;">×</button></span>
            </div>
        `;
    });
}

updateStats();
if (!keys.length) setTimeout(() => addSystem('👋 اضغط 🔑 لإضافة مفتاح'), 500);
</script>

</body>
</html>
